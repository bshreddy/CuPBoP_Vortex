name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout Repositoty
        uses: actions/checkout@v4
        with:
          submodules: recursive
          clean: false

      - name: Run Sbatch file
        run: chmod +x ./ci/run-crnch-cuda.sh && sbatch --wait --export=ALL ./ci/run-crnch-cuda.sh

  tests:
    runs-on: self-hosted
    needs: build
    strategy:
      fail-fast: false
      matrix:
        name: [backprop, dotproduct, pathfinder, psum, bfs, btree, conv3, nn, saxpy, sgemm, stencil, transpose, vecadd]
        # New benchmarks (not yet enabled):
        # atomicAggregate-cuda, bscan-cuda, gc-cuda, memcpytosymbol_test, psort, shuffle-cuda, vote-cuda
        scheduler: [2, 0]

    steps:
  #     - name: Checkout code
  #       uses: actions/checkout@v4

      - name: Run tests (SBATCH)
        run: |
          export TEST_NAME="${{ matrix.name }}"
          export VORTEX_SCHEDULE_FLAG="${{ matrix.scheduler }}"
          chmod +x ./ci/run-crnch-cuda-test.sh && sbatch --wait --export=ALL ./ci/run-crnch-cuda-test.sh
          echo "Showing last 100 lines of log:"
          LOG_FILE=/tools/ci-reports/CuPBoP_logs/${TEST_NAME}.out
          tail -n 100 $LOG_FILE

          if grep -q "Kernel compilation completed!" "$LOG_FILE" && \
             grep -q "Host compilation completed!" "$LOG_FILE" && \
             grep -q "Execution completed!" "$LOG_FILE"; then
            echo "Execution successful!"
          else
            echo "Execution failure."
            exit 1
          fi

      - name: Verify Correctness
        run: |
          export TEST_NAME="${{ matrix.name }}"
          echo "PWD: $(pwd)"
          ls -la ./examples/${TEST_NAME}/ci_output.txt || echo "ci_output.txt NOT FOUND"
          ls -la ./examples/${TEST_NAME}/golden_output.txt || echo "golden_output.txt NOT FOUND"
          EXAMPLE_DIR="./examples/${TEST_NAME}"
          CI_OUTPUT="${EXAMPLE_DIR}/ci_output.txt"

          case $TEST_NAME in
            saxpy|sgemm|psum|conv3|dotproduct|vecadd|stencil|transpose|atomic_test)
              if [ -f "$CI_OUTPUT" ] && grep -q "PASSED" "$CI_OUTPUT"; then
                echo "Correctness: PASS"
              else
                echo "Correctness: FAIL (PASSED not found)"
                [ -f "$CI_OUTPUT" ] && cat "$CI_OUTPUT"
                exit 1
              fi
              ;;
            backprop|nn|pathfinder)
              GOLDEN="${EXAMPLE_DIR}/golden_output.txt"
              if [ -f "$GOLDEN" ] && [ -f "$CI_OUTPUT" ]; then
                python3 ./ci/compare_golden.py "$GOLDEN" "$CI_OUTPUT" --tolerance=1e-4
              else
                echo "Golden or CI output missing, skipping"
              fi
              ;;
            bfs)
              GOLDEN="${EXAMPLE_DIR}/golden_result_bfs.txt"
              RESULT="${EXAMPLE_DIR}/result_vortex.txt"
              if [ -f "$GOLDEN" ] && [ -f "$RESULT" ]; then
                diff -q "$GOLDEN" "$RESULT" && echo "Correctness: PASS" || { echo "Correctness: FAIL"; diff "$GOLDEN" "$RESULT" || true; exit 1; }
              else
                echo "Golden or result file missing, skipping"
              fi
              ;;
            btree)
              GOLDEN="${EXAMPLE_DIR}/golden_result_btree.txt"
              RESULT="${EXAMPLE_DIR}/output.txt"
              if [ -f "$GOLDEN" ] && [ -f "$RESULT" ]; then
                diff -q "$GOLDEN" "$RESULT" && echo "Correctness: PASS" || { echo "Correctness: FAIL"; diff "$GOLDEN" "$RESULT" || true; exit 1; }
              else
                echo "Golden or result file missing, skipping"
              fi
              ;;
            *)
              echo "No correctness check defined for $TEST_NAME"
              ;;
          esac

  complete:
    runs-on: self-hosted
    needs: tests

    steps:
      - name: Check Completion
        run: echo "All matrix jobs passed"

