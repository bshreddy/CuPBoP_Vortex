name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout Repositoty
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Run Sbatch file
        run: chmod +x ./ci/run-crnch-cuda.sh && sbatch ./ci/run-crnch-cuda.sh

  tests:
    runs-on: self-hosted
    needs: build
    strategy:
      fail-fast: false
      matrix:
        name: [bfs, nn, pathfinder] #[gauss, nw, streamcluster, myocyte, pathfinder, lud, cfd, btree, backprop, heartwall, huffman, hotspot3D]
        # xlen: [32, 64]

    steps:
  #     - name: Checkout code
  #       uses: actions/checkout@v4


  #     - name: Download Build Artifact
  #       uses: actions/download-artifact@v4
  #       with:
  #         name: build-${{ matrix.xlen }}
  #         path: build${{ matrix.xlen }}

      - name: Run tests (SBATCH)
        run: |
          export TEST_NAME="${{ matrix.name }}"
          chmod +x ./ci/run-crnch-cuda-test.sh
          SLURM_JOB_ID=$(sbatch --parsable ./ci/run-crnch-cuda-test.sh)
          REMOTE_OUTPUT_FILE=/tools/ci-reports/CuPBoP_logs/CuPBoP-cuda-test-${SLURM_JOB_ID}.out

          cat $REMOTE_OUTPUT_FILE

  complete:
    runs-on: self-hosted
    needs: tests

    steps:
      - name: Check Completion
        run: echo "All matrix jobs passed"

