name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout Repositoty
        uses: actions/checkout@v4
        with:
          submodules: recursive
          clean: false

      - name: Run Sbatch file
        run: chmod +x ./ci/run-crnch-cuda.sh && sbatch --wait --export=ALL ./ci/run-crnch-cuda.sh

  tests:
    runs-on: self-hosted
    needs: build
    strategy:
      fail-fast: false
      matrix:
        name: [bfs, nn, pathfinder] #[gauss, nw, streamcluster, myocyte, pathfinder, lud, cfd, btree, backprop, heartwall, huffman, hotspot3D]
        # xlen: [32, 64]

    steps:
  #     - name: Checkout code
  #       uses: actions/checkout@v4


  #     - name: Download Build Artifact
  #       uses: actions/download-artifact@v4
  #       with:
  #         name: build-${{ matrix.xlen }}
  #         path: build${{ matrix.xlen }}

      - name: Run tests (SBATCH)
        continue-on-error: true
        run: |
          export TEST_NAME="${{ matrix.name }}"
          echo $TEST_NAME
          chmod +x ./ci/run-crnch-cuda-test.sh && sbatch --wait --export=ALL ./ci/run-crnch-cuda-test.sh
          echo "Showing last 100 lines of log:"
          LOG_FILE=/tools/ci-reports/CuPBoP_logs/${TEST_NAME}.out
          tail -n 100 $LOG_FILE

          if tail -n 3 "$LOG_FILE" | grep -q "Kernel compilation completed!" && \
             tail -n 3 "$LOG_FILE" | grep -q "Host compilation completed!" && \
             tail -n 3 "$LOG_FILE" | grep -q "Execution completed!"; then
            echo "Execution successful!"
            exit 0
          else
            echo "Execution failure."
            exit 1
          fi

  complete:
    runs-on: self-hosted
    needs: tests

    steps:
      - name: Check Completion
        run: echo "All matrix jobs passed"

